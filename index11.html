<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Folvy App — Acceso para clientes" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Folvy App — Próximamente</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --page: #F5F4F0;
      --accent: #1E3A5F;
      --brand-accent: #D67442;
      --text-primary: #1A1A1A;
      --text-secondary: #5A5A5A;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      background: var(--accent);
      color: var(--page);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .isotipo {
      width: 96px;
      height: 96px;
      margin-bottom: 2rem;
    }

    h1 {
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 700;
      font-size: clamp(2.5rem, 6vw, 4rem);
      line-height: 1.1;
      color: var(--page);
      margin-bottom: 0.5rem;
    }

    .subtitle {
      font-family: 'Fraunces', Georgia, serif;
      font-weight: 700;
      font-size: clamp(1.25rem, 3vw, 1.75rem);
      line-height: 1.2;
      color: var(--page);
      opacity: 0.9;
      margin-bottom: 2rem;
    }

    .description {
      font-size: 1.0625rem;
      line-height: 1.6;
      color: var(--page);
      opacity: 0.7;
      max-width: 480px;
      margin-bottom: 3rem;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.625rem 1.25rem;
      background: rgba(214, 116, 66, 0.15);
      border: 1px solid var(--brand-accent);
      border-radius: 999px;
      color: var(--brand-accent);
      font-size: 0.875rem;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    .status::before {
      content: '';
      width: 8px;
      height: 8px;
      background: var(--brand-accent);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    footer {
      position: absolute;
      bottom: 2rem;
      font-size: 0.8125rem;
      color: var(--page);
      opacity: 0.6;
    }

    footer a {
      color: var(--page);
      text-decoration: none;
      font-weight: 500;
      border-bottom: 1px solid currentColor;
    }
  </style>
</head>
<body>
  <div class="container">
    <svg class="isotipo" viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg" aria-label="Folvy">
      <circle cx="48" cy="48" r="44" fill="none" stroke="#F5F4F0" stroke-width="6"/>
      <path d="M 28 60 Q 48 28, 68 60" fill="none" stroke="#D67442" stroke-width="6" stroke-linecap="round"/>
      <circle cx="48" cy="64" r="4" fill="#F5F4F0"/>
    </svg>

    <h1>Folvy App</h1>
    <p class="subtitle">Aquí accederás pronto.</p>

    <p class="description">
      La aplicación Folvy para clientes estará disponible próximamente. Si tienes dudas, contacta con tu administrador.
    </p>

    <div class="status">Próximamente</div>
  </div>

  <footer>
    Conoce más en <a href="https://folvy.app">folvy.app</a>
  </footer>
</body>
</html>
